name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Install backend dependencies
        run: npm install --workspace backend --no-audit --no-fund

      - name: Install frontend dependencies
        run: npm install --workspace frontend --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Test (backend)
        run: npm --workspace backend run test

      - name: Test (frontend)
        run: npm --workspace frontend run test

      - name: Build
        run: npm run build

      - name: Audit
        run: npm audit --workspaces --audit-level=high || true

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: lint-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"
      - name: Trigger Vercel deploy
        env:
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          curl -X POST "$VERCEL_DEPLOY_HOOK"
