services:
  - type: web
    name: ai-lesson-generator-api
    runtime: node
    repo: https://github.com/IrfanCodesBTW/AI-Lesson-Generator
    branch: main
    plan: free
    buildCommand: cd backend && npm install --no-audit --no-fund && npm run build
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: GEMINI_TIMEOUT_MS
        value: "8000"
      - key: LOG_LEVEL
        value: info
