<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered preschool lesson plan generator. Create age-appropriate learning objectives, activities, rhymes, and worksheets in seconds using Google Gemini AI." />
    <meta name="theme-color" content="#6D5DF6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#08080d" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <title>AI Lesson Plan Generator</title>
    <!-- FOUC prevention: apply dark class before first paint -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Prevent flash of unstyled content */
      html { background-color: #F7F8FC; }
      html.dark { background-color: #08080d; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
